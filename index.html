<script>
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <script src="image-slot.js"><\/script>
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

<script>
// ORIGINS — M72/74 · real unit data
// Sources:
//  - Vermessungsplan M72 (CAD Office Müllner, 14.03.2022 / 026_778)
//  - Vermessungsplan M74 (CAD Office Müllner, 21.11.2022 / 085_450)
//  - Photo sessions PR0304–PR0313 (CAM04241G0)
//
// Areas are NGF (Nutzfläche aus Bestandsplan). The brief's marketed total
// (1.108,51 m²) is a Zinslisten-Nutzfläche which can be < NGF.

window.ORIGINS_DATA = (function () {

  // ---- Image URL resolver: resolves logical path to data URI when inlined ----
  window.imgSrc = (path) => {
    if (!path) return "";
    if (typeof window.ORIGINS_IMAGES === "object" && window.ORIGINS_IMAGES[path]) {
      return window.ORIGINS_IMAGES[path];
    }
    return path;
  };

  // ---- PR-Sessions index ----
  // For each photo group, we record kind + count + a representative caption.
  const PR = {
    '72-PR0304': { count: 5, kind: 'interior',  cap: 'Innenraum · originaler Zustand' },
    '72-PR0305': { count: 5, kind: 'interior',  cap: 'Wohnung · Parkett, Küche' },

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  // -------------------------------------------------------------------
  // Process — 5 steps
  // -------------------------------------------------------------------
  function Process({ t, steps }) {

  function ByUnio({ t }) {

  window.FinalCTA = FinalCTA;

  function Field({ label, value, onChange, type = "text", required, multi, placeholder }) {
    return (
      <div className="field cta-field">
        <label>{label}{required && <span className="req"> *</span>}</label>
        {multi ? (
          <textarea rows="3" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} />
        ) : (
          <input type={type} value={value} onChange={(e) => onChange(e.target.value)} required={required} placeholder={placeholder} />
        )}
      </div>
    );
  }
  function FieldSelect({ label, value, onChange, options }) {
    return (
      <div className="field cta-field">
        <label>{label}</label>
        <select value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map(o => <option key={o.v} value={o.v}>{o.label}</option>)}
        </select>
      </div>
    );
  }

  // -------------------------------------------------------------------
  // Enquiry modal — Albrecht-style popup, opened from unit "Anfragen"
  // -------------------------------------------------------------------
  function EnquiryModal({ open, unit, t, onClose }) {
    const [form, setForm] = useState({ first: "", last: "", email: "", phone: "", msg: "" });
    const [sent, setSent] = useState(false);
    const [prov, setProv] = useState(false);

    useEffect(() => {
      if (open) {
        document.body.style.overflow = "hidden";
        setSent(false);
        setForm({ first: "", last: "", email: "", phone: "", msg: "" });
        setProv(false);
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", onKey);
        return () => { document.body.style.overflow = ""; window.removeEventListener("keydown", onKey); };
      }
      document.body.style.overflow = "";
    }, [open]);

    if (!open) return null;
    const up = (k, v) => setForm(f => ({ ...f, [k]: v }));
    const submit = (e) => { e.preventDefault(); setSent(true); };
    const chip = unit
      ? `${unit.top} · ${unit.rooms} Zi · ${unit.size.toFixed(2).replace(".", ",")} m²`
      : t.enq_general;

    return (
      <div className="enq-scrim" onClick={onClose} role="dialog" aria-modal="true">
        <div className="enq" onClick={(e) => e.stopPropagation()}>
          <button className="enq-close" onClick={onClose} aria-label="Schließen">
            <svg width="15" height="15" viewBox="0 0 14 14"><path d="M1 1 L13 13 M13 1 L1 13" stroke="currentColor" strokeWidth="1.2"/></svg>
          </button>

          {sent ? (
            <div className="enq-sent">
              <OriginMark size={26} stroke="var(--court-brass)" />
              <h3 className="display-4 enq-sent-h">{t.enq_sent_h}</h3>
              <p className="enq-sent-b">{t.enq_sent_b}</p>
              <button className="btn btn-primary" onClick={onClose}>{t.enq_close} <span className="arrow">→</span></button>
            </div>
          ) : (
            <form className="enq-form" onSubmit={submit}>
              <h3 className="enq-title">{t.enq_title}</h3>
              <span className="enq-chip">{chip}</span>
              <span className="enq-via meta">{t.enq_via}</span>

              <div className="enq-row">
                <Field label={t.enq_first} value={form.first} onChange={(v) => up("first", v)} required />
                <Field label={t.enq_last} value={form.last} onChange={(v) => up("last", v)} required />
              </div>
              <Field label={t.enq_email} type="email" value={form.email} onChange={(v) => up("email", v)} required />
              <Field label={t.enq_phone} value={form.phone} onChange={(v) => up("phone", v)} required />
              <Field label={t.enq_msg} value={form.msg} onChange={(v) => up("msg", v)} multi placeholder={t.enq_msg_ph} />

              <div className="enq-actions">
                <button type="button" className="btn btn-secondary" onClick={onClose}>{t.enq_cancel}</button>
                <button type="submit" className="btn btn-primary enq-send">{t.enq_send}</button>
              </div>

              <button type="button" className="enq-prov-toggle" onClick={() => setProv(p => !p)}>
                {t.enq_provision} <span className={`enq-prov-caret ${prov ? "is-open" : ""}`}>⌄</span>
              </button>
              {prov && <p className="enq-prov-text meta">{t.enq_provision_text}</p>}
            </form>
          )}
        </div>
      </div>
    );
  }
  window.EnquiryModal = EnquiryModal;

  // -------------------------------------------------------------------
  // Footer
  // -------------------------------------------------------------------
  function Footer({ t }) {
    return (
      <footer className="origin-footer" data-screen-label="Footer">
        <div className="of-mega">
          <span className="of-mega-text">ORIGIN<span className="o-dot">·</span>S</span>
        </div>

        <div className="of-grid">
          <div className="of-col of-col-brand">
            <div className="of-lockup">
              <span className="of-mark"><OriginMark size={22} stroke="rgba(245,241,232,0.8)" /></span>
              <span className="of-wordmark">ORIGINS</span>
            </div>
            <p className="of-sub">{t.lockup_line1}</p>
            <p className="of-sub muted-d">{t.lockup_line2}</p>
            <p className="of-brandline meta on-dark mono">{t.footer_brandline}</p>
          </div>

          <div className="of-col">
            <span className="meta on-dark of-col-h">{t.footer_col_a_h}</span>
            <ul>
              <li><a href="#projekt">{t.nav_projekt}</a></li>
              <li><a href="#einheiten">{t.nav_einheiten}</a></li>
              <li><a href="#original">{t.nav_original}</a></li>
              <li><a href="#prozess">{t.nav_prozess}</a></li>
            </ul>
          </div>

          <div className="of-col">
            <span className="meta on-dark of-col-h">{t.footer_col_b_h}</span>
            <ul>
              <li><a href="#konzept">Konzept</a></li>
              <li><a href="#opportunity">Möglichkeit</a></li>
              <li><a href="#potential">Potenzial</a></li>
              <li><a href="#lage">{t.nav_lage}</a></li>
            </ul>
          </div>

          <div className="of-col">
            <span className="meta on-dark of-col-h">{t.footer_col_c_h}</span>
            <ul>
              <li>{t.footer_addr_h}</li>
              <li className="muted-d">{t.footer_addr_b}</li>
            </ul>
          </div>
        </div>

        <div className="of-bottom">
          <span>Vermarktet bei <a href="https://app.unio.at" target="_blank" rel="noopener">Unio Verse GmbH</a> · Homepage <a href="https://www.ad.boutique" target="_blank" rel="noopener">Ad Boutique</a></span>
          <span className="of-legal">
            <a href="https://www.unio.at/impressum" target="_blank" rel="noopener">{t.footer_legal_a}</a>
            <span className="of-dot">·</span>
            <a href="https://www.unio.at/datenschutz" target="_blank" rel="noopener">{t.footer_legal_b}</a>
          </span>
          
        </div>
      </footer>
    );
  }
  window.Footer = Footer;

})();

</script>
<script type="text/babel" data-presets="react">
/* global React */
// Unit Collection — filter row + grid + detail drawer with real plans + photo gallery.

(function () {
  const { useState, useMemo, useEffect, useRef } = React;
  const eur = (n) => n ? "€ " + n.toLocaleString("de-DE") : "Preis auf Anfrage";

  function UnitCollection({ t, units, onEnquire }) {
    const [filters, setFilters] = useState({
      haus: "all",
      floorIdx: "all",
      type: "all",
      status: "all"
    });
    const [plan, setPlan] = useState(null);
    const [view, setView] = useState("grid");

    const filtered = useMemo(() => {
      return units.filter(u =>
        (filters.haus === "all" || u.haus === filters.haus) &&
        (filters.floorIdx === "all" || String(u.floorIdx) === filters.floorIdx) &&
        (filters.type === "all" || u.type === filters.type) &&
        (filters.status === "all" || u.status === filters.status)
      ).sort((a, b) => a.code.localeCompare(b.code));
    }, [units, filters]);

    const reset = () => setFilters({ haus: "all", floorIdx: "all", type: "all", status: "all" });

    useEffect(() => {
      const fn = (e) => { if (e.key === "Escape") setPlan(null); };
      window.addEventListener("keydown", fn);
      return () => window.removeEventListener("keydown", fn);
    }, []);

    const floors = [
      { v: "all", label: t.units_filter_all },
      { v: "0", label: "KG" },
      { v: "1", label: "EG/HP" },
      { v: "2", label: "1.OG" },
      { v: "3", label: "2.OG" },
      { v: "4", label: "DG" }
    ];

    return (
      <section id="einheiten" className={`section sec-units ${view === "list" ? "is-listview" : ""}`} data-screen-label="Unit Collection">
        <div className="container">
          <header className="sec-head" data-reveal>
            <span className="eyebrow eyebrow-dot">{t.units_eyebrow}</span>
            <h2 className="display-2">{t.units_h}</h2>
            <p className="lede col-7" style={{ marginTop: 24 }}>{t.units_lede}</p>
          </header>

          {/* Filter row */}
          <div className="unit-filter" data-reveal>
            <FilterGroup label={t.units_filter_haus} value={filters.haus}
              onChange={(v) => setFilters({ ...filters, haus: v })}
              options={[{ v: "all", label: t.units_filter_all }, { v: "72", label: "Haus 72" }, { v: "74", label: "Haus 74" }]} />

            <FilterGroup label={t.units_filter_floor} value={filters.floorIdx}
              onChange={(v) => setFilters({ ...filters, floorIdx: v })}
              options={floors} />

            <FilterGroup label={t.units_filter_type} value={filters.type}
              onChange={(v) => setFilters({ ...filters, type: v })}
              options={[
                { v: "all", label: t.units_filter_all },
                { v: "Wohnung", label: "Wohnung" },
                { v: "Geschäftslokal", label: "Geschäft" }
              ]} />

            <FilterGroup label={t.units_filter_status} value={filters.status}
              onChange={(v) => setFilters({ ...filters, status: v })}
              options={[
                { v: "all",        label: t.units_filter_all },
                { v: "available",  label: t.units_status_available },
                { v: "vermietet",  label: t.units_status_rented }
              ]} />

            <div className="filter-meta">
              <div className="unit-view-toggle" role="group" aria-label={t.units_view_label}>
                <button type="button" className={`uvt-btn ${view === "grid" ? "is-active" : ""}`}
                  onClick={() => setView("grid")} aria-pressed={view === "grid"} aria-label={t.units_view_grid}>
                  <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden>
                    <rect x="0.5" y="0.5" width="5.5" height="5.5" fill="currentColor"/>
                    <rect x="8" y="0.5" width="5.5" height="5.5" fill="currentColor"/>
                    <rect x="0.5" y="8" width="5.5" height="5.5" fill="currentColor"/>
                    <rect x="8" y="8" width="5.5" height="5.5" fill="currentColor"/>
                  </svg>
                </button>
                <button type="button" className={`uvt-btn ${view === "list" ? "is-active" : ""}`}
                  onClick={() => setView("list")} aria-pressed={view === "list"} aria-label={t.units_view_list}>
                  <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden>
                    <line x1="0" y1="2" x2="14" y2="2" stroke="currentColor" strokeWidth="1.4"/>
                    <line x1="0" y1="7" x2="14" y2="7" stroke="currentColor" strokeWidth="1.4"/>
                    <line x1="0" y1="12" x2="14" y2="12" stroke="currentColor" strokeWidth="1.4"/>
                  </svg>
                </button>
              </div>
              <span className="meta">{t.units_count(filtered.length, units.length)}</span>
              <button className="filter-clear" onClick={reset}>
                <span>{t.units_filter_clear}</span>
                <svg width="11" height="11" viewBox="0 0 11 11" aria-hidden><path d="M1 1 L10 10 M10 1 L1 10" stroke="currentColor" strokeWidth="1"/></svg>
              </button>
            </div>
          </div>

          {/* Grid / List */}
          <div className="unit-grid" data-reveal-children>
            {filtered.length === 0 && (
              <div className="unit-empty">{t.units_empty}</div>
            )}
            {filtered.map((u) => (
              <UnitCard key={u.code} u={u} t={t} onPlan={setPlan} onEnquire={onEnquire} />
            ))}
          </div>
        </div>

        {/* Grundriss + Foto-Lightbox */}
        <UnitLightbox u={plan} t={t}
          onClose={() => setPlan(null)}
          onEnquire={onEnquire} />
      </section>
    );
  }

  function FilterGroup({ label, value, onChange, options }) {
    return (
      <div className="filter-group">
        <span className="filter-label">{label}</span>
        <div className="filter-chips">
          {options.map(o => (
            <button key={o.v}
              className={`chip ${value === o.v ? "is-active" : ""}`}
              onClick={() => onChange(o.v)}
              aria-pressed={value === o.v}>
              {o.label}
            </button>
          ))}
        </div>
      </div>
    );
  }

  function UnitCard({ u, t, onPlan, onEnquire }) {
    const isAvail = u.status === "available";
    const stateLabel = u.type === "Geschäftslokal"
      ? t.units_card_state_commercial
      : (u.haus === "74" ? t.units_card_state_74 : t.units_card_state);
    return (
      <article className={`unit-card ${isAvail ? "is-available" : "is-rented"}`}>
        <button className="unit-card-plan" onClick={() => onPlan(u)} aria-label={`Grundriss ${u.top} vergrößern`}>
          <img src={imgSrc(u.plan)} alt={`Grundriss ${u.top} · ${u.code}`} loading="lazy" />
          <span className="unit-card-coord">
            <span className="cross">
              <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden>
                <line x1="7" y1="0" x2="7" y2="14" stroke="currentColor" strokeWidth="0.6"/>
                <line x1="0" y1="7" x2="14" y2="7" stroke="currentColor" strokeWidth="0.6"/>
                <circle cx="7" cy="7" r="1.6" fill="currentColor"/>
              </svg>
            </span>
            {u.haus === "72" ? "M72" : "M74"} · {u.floor}
          </span>
          <span className="unit-card-zoom">
            <svg width="13" height="13" viewBox="0 0 13 13" aria-hidden>
              <circle cx="5.5" cy="5.5" r="4" fill="none" stroke="currentColor" strokeWidth="1"/>
              <line x1="8.4" y1="8.4" x2="12" y2="12" stroke="currentColor" strokeWidth="1"/>
              <line x1="5.5" y1="3.6" x2="5.5" y2="7.4" stroke="currentColor" strokeWidth="1"/>
              <line x1="3.6" y1="5.5" x2="7.4" y2="5.5" stroke="currentColor" strokeWidth="1"/>
            </svg>
            Grundriss
          </span>
        </button>

        <div className="unit-card-body">
          <header className="unit-card-head">
            <span className="unit-card-code">{u.top} · {u.code}</span>
            <span className={`unit-card-status status-${u.status}`}>
              {isAvail ? t.units_status_available : t.units_status_rented_buyable}
            </span>
          </header>

          <div className="unit-card-size">
            <span className="num">{u.size.toFixed(2).replace(".", ",")}</span>
            <span className="unit">m²</span>
          </div>

          <div className="unit-card-price">
            <span className="ucp-amount">{eur(u.price)}</span>
            {u.lease && <span className="ucp-lease">{u.lease} vermietet</span>}
          </div>

          <dl className="unit-card-meta">
            <div><dt>{t.units_card_floor}</dt><dd>{u.floor}</dd></div>
            <div><dt>{t.units_card_rooms}</dt><dd>{u.rooms}</dd></div>
            <div><dt>{t.units_card_orientation}</dt><dd>{u.orientation}</dd></div>
          </dl>

          <footer className="unit-card-foot">
            <span className="unit-card-state">{stateLabel}</span>
            <button className="unit-card-cta-btn" onClick={() => onEnquire(u)}>
              {t.units_card_cta} <span className="arrow">→</span>
            </button>
          </footer>
        </div>
      </article>
    );
  }

  // Lightbox — enlarge the floor plan + browse the unit photos
  function UnitLightbox({ u, t, onClose, onEnquire }) {
    const [idx, setIdx] = useState(0);

    useEffect(() => {
      if (u) { document.body.style.overflow = "hidden"; setIdx(0); }
      else document.body.style.overflow = "";
      return () => { document.body.style.overflow = ""; };
    }, [u]);

    if (!u) return null;

    const slides = [
      { src: u.plan, alt: `Grundriss ${u.top}`, cap: "Bestandsplan · Müllner CAD · 2022", isPlan: true }
      // Foto-Galerie vorübergehend ausgeblendet — nur Grundriss anzeigen.
      // Zum Reaktivieren die folgende Zeile wieder einkommentieren:
      // , ...(u.photos || []).map(p => ({ src: p.src, alt: p.alt, cap: p.alt }))
    ];
    const cur = slides[Math.min(idx, slides.length - 1)];
    const many = slides.length > 1;

    return (
      <div className="lb-scrim" onClick={onClose} role="dialog" aria-modal="true">
        <div className="lb" onClick={(e) => e.stopPropagation()}>
          <header className="lb-head">
            <div className="lb-title">
              <span className="eyebrow">{u.top} · {u.code}</span>
              <span className="lb-sub meta">{u.size.toFixed(2).replace(".", ",")} m² · {u.floor} · {eur(u.price)}</span>
            </div>
            <button className="lb-close" onClick={onClose} aria-label="Schließen">
              <svg width="15" height="15" viewBox="0 0 14 14"><path d="M1 1 L13 13 M13 1 L1 13" stroke="currentColor" strokeWidth="1.2"/></svg>
            </button>
          </header>

          <div className={`lb-stage ${cur.isPlan ? "is-plan" : ""}`}>
            <img key={cur.src} src={imgSrc(cur.src)} alt={cur.alt} className="lb-img" />
            {many && (
              <React.Fragment>
                <button className="lb-nav lb-prev" onClick={() => setIdx((idx - 1 + slides.length) % slides.length)} aria-label="zurück">
                  <svg width="16" height="16" viewBox="0 0 14 14"><path d="M9 1 L3 7 L9 13" fill="none" stroke="currentColor" strokeWidth="1.2"/></svg>
                </button>
                <button className="lb-nav lb-next" onClick={() => setIdx((idx + 1) % slides.length)} aria-label="weiter">
                  <svg width="16" height="16" viewBox="0 0 14 14"><path d="M5 1 L11 7 L5 13" fill="none" stroke="currentColor" strokeWidth="1.2"/></svg>
                </button>
              </React.Fragment>
            )}
            <div className="lb-cap">
              {many && <span className="meta mono">{String(idx + 1).padStart(2, "0")} / {String(slides.length).padStart(2, "0")}</span>}
              <span className="meta">{cur.cap}</span>
            </div>
          </div>

          {many && (
            <div className="lb-thumbs">
              {slides.map((s, i) => (
                <button key={s.src + i} className={`lb-thumb ${i === idx ? "is-active" : ""} ${s.isPlan ? "is-plan" : ""}`}
                  onClick={() => setIdx(i)} aria-label={`Bild ${i + 1}`}>
                  <img src={imgSrc(s.src)} alt="" />
                </button>
              ))}
            </div>
          )}

          <div className="lb-foot">
            <span className="meta">{u.haus === "74" ? "Bezugsfertig" : "Originalzustand"} · M{u.haus}</span>
            <button className="btn btn-primary" onClick={() => { onClose(); onEnquire(u); }}>
              {t.units_card_cta} <span className="arrow">→</span>
            </button>
          </div>
        </div>
      </div>
    );
  }

  window.UnitCollection = UnitCollection;
})();

</script>
<script type="text/babel" data-presets="react">
/* global React, ReactDOM, ORIGINS_DATA, ORIGINS_I18N,
   Hero, Concept, Opportunity, OriginalState, UnitCollection,
   Potential, Location, Process, ByUnio, FinalCTA, Footer, OriginMark, StoererBand, Clarity, EnquiryModal,
   TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakToggle, TweakColor, useTweaks */

(function () {
  const { useState, useEffect, useRef, useMemo } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "lang": "de",
    "palette": "ivory",
    "ctaStyle": "block",
    "showInquiryBar": true,
    "originMark": "crosshair",
    "showStatBand": true
  }/*EDITMODE-END*/;

  function App() {
    const [t, setT] = useTweaks(TWEAK_DEFAULTS);
    const i18n = ORIGINS_I18N[t.lang === "en" ? "en" : "de"];

    const [navScrolled, setNavScrolled] = useState(false);
    const [activeNav, setActiveNav] = useState("projekt");
    const [showSticky, setShowSticky] = useState(false);
    const [menuOpen, setMenuOpen] = useState(false);
    const [enquiryOpen, setEnquiryOpen] = useState(false);
    const [enquiryUnit, setEnquiryUnit] = useState(null);

    // Scroll observers
    useEffect(() => {
      const onScroll = () => {
        setNavScrolled(window.scrollY > 60);
        setShowSticky(window.scrollY > 700);
      };
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
      return () => window.removeEventListener("scroll", onScroll);
    }, []);

    // Active section observer
    useEffect(() => {
      const ids = ["projekt", "konzept", "einheiten", "original", "potential", "klarheit", "lage", "prozess", "kontakt"];
      const els = ids.map(id => document.getElementById(id)).filter(Boolean);
      if (els.length === 0) return;
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) setActiveNav(e.target.id);
        });
      }, { rootMargin: "-40% 0px -55% 0px", threshold: 0.01 });
      els.forEach(el => obs.observe(el));
      return () => obs.disconnect();
    }, []);

    // Reveal-on-scroll
    useEffect(() => {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) e.target.classList.add("is-in");
        });
      }, { threshold: 0, rootMargin: "0px 0px -40px 0px" });
      document.querySelectorAll("[data-reveal], [data-reveal-children]").forEach(el => obs.observe(el));
      return () => obs.disconnect();
    }, []);

    // Body class for palette
    useEffect(() => {
      document.body.classList.remove("scheme-ivory", "scheme-stone-light", "scheme-graphite");
      document.body.classList.add(`scheme-${t.palette}`);
    }, [t.palette]);

    // CTA style class
    useEffect(() => {
      document.documentElement.classList.remove("cta-block", "cta-pill", "cta-underline");
      document.documentElement.classList.add(`cta-${t.ctaStyle}`);
    }, [t.ctaStyle]);

    // Mark style class
    useEffect(() => {
      document.documentElement.classList.remove("mark-cross", "mark-ring", "mark-dot");
      document.documentElement.classList.add(`mark-${t.originMark}`);
    }, [t.originMark]);

    const scrollTo = (id) => {
      const el = document.getElementById(id);
      if (!el) return;
      const top = el.getBoundingClientRect().top + window.scrollY - 70;
      window.scrollTo({ top, behavior: "smooth" });
    };

    const startEnquiry = (unit = null) => {
      setEnquiryUnit(unit || null);
      setEnquiryOpen(true);
    };

    const navItems = [
      { id: "konzept",   label: i18n.nav_projekt },
      { id: "einheiten", label: i18n.nav_einheiten },
      { id: "lage",      label: i18n.nav_lage }
    ];

    const goMobile = (id) => { setMenuOpen(false); setTimeout(() => scrollTo(id), 60); };

    // Lock scroll when mobile menu open
    useEffect(() => {
      if (menuOpen) {
        const prev = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        return () => { document.body.style.overflow = prev; };
      }
    }, [menuOpen]);

    return (
      <React.Fragment>
        {/* Nav */}
        <header className={`origin-nav ${navScrolled ? "is-light" : ""} ${menuOpen ? "is-menu-open" : ""}`}>
          <div className="on-inner">
            <a href="#projekt" className="on-brand" onClick={(e) => { e.preventDefault(); goMobile("projekt"); }}>
              <span className="on-mark">
                <OriginMark size={20} />
              </span>
              <span className="on-word">ORIGINS</span>
              <span className="on-sub">M72/74</span>
            </a>

            <nav className="on-nav">
              {navItems.map(n => (
                <a key={n.id} href={`#${n.id}`}
                  className={activeNav === n.id ? "is-active" : ""}
                  onClick={(e) => { e.preventDefault(); scrollTo(n.id); }}>
                  {n.label}
                </a>
              ))}
            </nav>

            <div className="on-cta">
              <button className="on-pill" onClick={() => startEnquiry()}>
                <span>{i18n.nav_cta}</span>
                <span className="arrow">→</span>
              </button>
              <button className={`on-burger ${menuOpen ? "is-open" : ""}`}
                onClick={() => setMenuOpen(o => !o)} aria-label="Menü" aria-expanded={menuOpen}>
                <span></span><span></span><span></span>
              </button>
            </div>
          </div>
        </header>

        {/* Mobile menu overlay */}
        <div className={`on-menu ${menuOpen ? "is-open" : ""}`} aria-hidden={!menuOpen}>
          <nav className="on-menu-nav">
            {navItems.map((n, i) => (
              <a key={n.id} href={`#${n.id}`}
                className={activeNav === n.id ? "is-active" : ""}
                style={{ transitionDelay: `${menuOpen ? 80 + i * 45 : 0}ms` }}
                onClick={(e) => { e.preventDefault(); goMobile(n.id); }}>
                <span className="omn-n">{String(i + 1).padStart(2, "0")}</span>
                <span className="omn-l">{n.label}</span>
              </a>
            ))}
          </nav>
          <div className="on-menu-foot">
            <button className="btn btn-primary" onClick={() => { setMenuOpen(false); setTimeout(() => startEnquiry(), 60); }}>
              {i18n.nav_cta} <span className="arrow">→</span>
            </button>
            <div className="on-menu-meta">
              <span className="meta mono">M72/74 · 1130 Wien</span>
              <span className="meta">Original State Homes by UNIO</span>
            </div>
          </div>
        </div>

        <main className="origin-main">
          <Hero t={i18n}
            onScrollUnits={() => scrollTo("einheiten")}
            onEnquire={() => startEnquiry()}
            heroPhoto={ORIGINS_DATA.heroPhoto} />

          <Concept t={i18n} />

          <Opportunity t={i18n} />

          {/* TEMP (Kerbler Einwertung 17.04.2026): nur die aktuell angebotenen
              Einheiten zeigen. Zum Zurücksetzen .filter(...) entfernen. */}
          <UnitCollection t={i18n}
            units={ORIGINS_DATA.units.filter(u => [
              "M72-03","M72-04","M72-05","M72-06","M72-07",
              "M74-03","M74-04","M74-05","M74-08"
            ].includes(u.code))}
            onEnquire={startEnquiry} />

          <OriginalState t={i18n} faq={ORIGINS_DATA.faq[t.lang === "en" ? "en" : "de"]} />

          <Potential t={i18n}
            materials={ORIGINS_DATA.materials}
            comparisons={ORIGINS_DATA.comparisons[t.lang === "en" ? "en" : "de"]} />

          <StoererBand src="assets/photos/stoerer.jpg" />

          <Clarity t={i18n}
            objections={ORIGINS_DATA.objections[t.lang === "en" ? "en" : "de"]}
            costTiers={ORIGINS_DATA.costTiers[t.lang === "en" ? "en" : "de"]} />

          <Umgebung t={i18n} environs={ORIGINS_DATA.environs[t.lang === "en" ? "en" : "de"]} />

          <Location t={i18n} />

          <Process t={i18n} steps={ORIGINS_DATA.process[t.lang === "en" ? "en" : "de"]} />

          <ByUnio t={i18n} />

          <FinalCTA t={i18n} onFinder={() => scrollTo("einheiten")} />

          <Footer t={i18n} />
        </main>

        <EnquiryModal open={enquiryOpen} unit={enquiryUnit} t={i18n} onClose={() => setEnquiryOpen(false)} />

        {/* Sticky inquiry bar */}
        {t.showInquiryBar && showSticky && activeNav !== "kontakt" && (
          <div className="sticky-inq" data-cc-id="sticky-inq">
            <span className="si-pulse" />
            <span className="si-label">{i18n.sticky_label}</span>
            <button className="si-cta" onClick={() => scrollTo("einheiten")}>
              {i18n.sticky_cta} <span className="arrow">→</span>
            </button>
          </div>
        )}

        {/* Tweaks */}
        <TweaksPanel title="Tweaks · ORIGINS">
          <TweakSection title="Sprache & Ton">
            <TweakRadio label="Sprache" value={t.lang} onChange={(v) => setT("lang", v)}
              options={[{ value: "de", label: "DE" }, { value: "en", label: "EN" }]} />
          </TweakSection>

          <TweakSection title="Palette">
            <TweakColor label="Hintergrund-Schema" value={t.palette} onChange={(v) => setT("palette", v)}
              options={[
                ["#F5F1E8", "#1B1D19", "#A88A4A"],
                ["#ECE6D8", "#1B1D19", "#A88A4A"],
                ["#EDE9DF", "#232826", "#AAB39D"]
              ]} />
            <span className="meta" style={{ fontSize: 10, opacity: 0.7, marginTop: 6, display: "block" }}>
              Ivory · Parchment · Graphite-soft
            </span>
          </TweakSection>

          <TweakSection title="CTA-Stil">
            <TweakRadio label="Button" value={t.ctaStyle} onChange={(v) => setT("ctaStyle", v)}
              options={[
                { value: "block",     label: "Block" },
                { value: "pill",      label: "Pill" },
                { value: "underline", label: "Linie" }
              ]} />
          </TweakSection>

          <TweakSection title="Origin-Mark">
            <TweakRadio label="Motiv" value={t.originMark} onChange={(v) => setT("originMark", v)}
              options={[
                { value: "crosshair", label: "Crosshair" },
                { value: "ring",      label: "Ring" },
                { value: "dot",       label: "Punkt" }
              ]} />
          </TweakSection>

          <TweakSection title="Anzeige">
            <TweakToggle label="Sticky-Inquiry-Bar" value={t.showInquiryBar} onChange={(v) => setT("showInquiryBar", v)} />
            <TweakToggle label="Stat-Band" value={t.showStatBand} onChange={(v) => setT("showStatBand", v)} />
          </TweakSection>
        </TweaksPanel>

        <style>{`
          ${t.showStatBand ? "" : ".stat-band { display: none !important; }"}
        `}</style>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();

</script>
<script>
  (function(){const o=console.error;console.error=function(...a){if(a[0]&&typeof a[0]==='string'&&/ResizeObserver loop/i.test(a[0]))return;return o.apply(console,a);};window.addEventListener('error',(e)=>{if(e.message&&/ResizeObserver loop/i.test(e.message)){e.stopImmediatePropagation();e.preventDefault();}},true);})();
  const obs=new MutationObserver(()=>{if(document.getElementById("root").childElementCount>0){document.body.classList.remove("is-loading");document.body.classList.add("is-ready");const pre=document.querySelector(".pre-skel");if(pre)setTimeout(()=>pre.remove(),700);obs.disconnect();}});
  obs.observe(document.getElementById("root"),{childList:true});
  setTimeout(()=>{document.body.classList.add("is-ready");},4000);
</script>
</body>
</html>
